openapi: 3.1.0
info:
  title: Daily Adhkar API
  version: 1.0.0
  description: >-
    API for user management, subscription status updates,
    reminder metadata, and daily email scheduling.
servers:
  - url: http://localhost:8080
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        gender:
          type: string
          enum:
            - male
            - female
        is_subscribed:
          type: boolean
        total_email_received:
          type: integer
        role:
          type: string
          enum:
            - user
            - admin
      required:
        - id
        - name
        - email
        - gender
        - is_subscribed
        - total_email_received
        - role
    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        gender:
          type: string
          enum:
            - male
            - female
      required:
        - name
        - email
        - gender
    UsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
      required:
        - users
    MetadataResponse:
      type: object
      properties:
        total_users:
          type: integer
        total_emails_sent:
          type: integer
      required:
        - total_users
        - total_emails_sent
    UpdateSubscriptionRequest:
      type: object
      properties:
        is_subscribed:
          type: boolean
      required:
        - is_subscribed
paths:
  /health:
    get:
      summary: Health check
      description: Checks API availability and database connectivity.
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok
        '503':
          description: Database unavailable
  /users:
    get:
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
        '500':
          description: Failed to load users
    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              newUser:
                value:
                  name: John Doe
                  email: john@example.com
                  gender: male
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid payload or missing fields
        '500':
          description: Failed to create user
  /users/{id}:
    get:
      summary: Get single user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid user ID
        '404':
          description: User not found
        '500':
          description: Failed to load user
    patch:
      summary: Update user subscription status
      description: Updates only is_subscribed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionRequest'
            examples:
              unsubscribe:
                value:
                  is_subscribed: false
              subscribe:
                value:
                  is_subscribed: true
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid payload or user ID
        '404':
          description: User not found
        '500':
          description: Failed to update user
    delete:
      summary: Delete user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '400':
          description: Invalid user ID
        '404':
          description: User not found
        '500':
          description: Failed to delete user
  /metadata:
    get:
      summary: Get aggregate metadata
      description: Returns total users and total emails sent.
      responses:
        '200':
          description: Metadata counters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataResponse'
        '500':
          description: Failed to load metadata
