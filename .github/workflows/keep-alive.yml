name: Keep Render Server Awake

on:
  schedule:
    # run after every 1 hour
    - cron: "0 * * * *"
  workflow_dispatch: # run manually if want

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the Up Endpoint
        run: |
          curl -s -H "X-App-Secret: ${{ secrets.APP_SECRET }}" https://dailyadhkar-api.onrender.com/up
