name: Keep Render Server Awake

on:
  schedule:
    # run after every 10 min
    - cron: "*/10 * * * *"
  workflow_dispatch: # run manually if want

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the Health Endpoint
        run: |
          curl -s -H "X-App-Secret: ${{ secrets.APP_SECRET }}" https://dailyadhkar-api.onrender.com/health
